<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>盈盈學習樂園</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#6b4415">
<style>
:root{
  --brown:#6b4415; --brown-deep:#4a2c14; --cream:#fff6dc; --card:#ffffff;
  --pudding:#f6b73c; --yellow:#ffd873; --ink:#4a3320; --sub:#9a8468; --line:#f2e2bf;
  --green:#3aa06a; --red:#d9534f;
  --c-chinese:#c95b5b; --c-math:#e3922f; --c-english:#4579c9;
  --c-science:#329f7d; --c-social:#8a68c4; --c-reading:#b0803a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;background:var(--cream);color:var(--ink);
  padding-bottom:calc(76px + env(safe-area-inset-bottom))}
header{background:var(--brown);color:#fff;padding:calc(14px + env(safe-area-inset-top)) 18px 14px}
header h1{font-size:1.25rem;letter-spacing:2px}
header .sub{font-size:.8rem;opacity:.8;margin-top:2px}
main{padding:16px;max-width:560px;margin:0 auto}
section.tab{display:none}
section.tab.on{display:block}
h2{font-size:1rem;margin:20px 2px 10px;letter-spacing:1px;color:var(--brown)}
.hero{display:flex;gap:12px;background:var(--card);border-radius:18px;padding:16px}
.hero div{flex:1}
.hero .lbl{font-size:.8rem;color:var(--sub);display:flex;align-items:center;gap:5px}
.hero .num{font-size:1.9rem;font-weight:800;font-variant-numeric:tabular-nums}
.hero .num small{font-size:.85rem;font-weight:600;color:var(--sub);margin-left:2px}
.bigbtn{display:flex;align-items:center;gap:12px;width:100%;border:0;background:var(--pudding);color:var(--brown-deep);
  border-radius:18px;padding:16px;margin-top:14px;font-size:1.05rem;font-weight:800;letter-spacing:1px;cursor:pointer;text-align:left;font-family:inherit}
.bigbtn small{display:block;font-size:.78rem;font-weight:500;opacity:.85;letter-spacing:0;margin-top:3px}
.bigbtn svg{flex:none}
.bigbtn .spacer{flex:1}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.subcard{background:var(--card);border-radius:18px;padding:14px;border:0;text-align:left;cursor:pointer;font:inherit;color:var(--ink)}
.subcard .t{display:flex;align-items:center;gap:8px;font-weight:800;font-size:1rem}
.subcard .bar{height:7px;background:var(--line);border-radius:4px;margin:10px 0 6px;overflow:hidden}
.subcard .bar i{display:block;height:100%;border-radius:4px}
.subcard .d{font-size:.75rem;color:var(--sub)}
.subcard .done{font-size:.78rem;font-weight:800;color:var(--green)}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--card);border-radius:18px;padding:14px}
.stat .lbl{display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:800}
.stat .num{font-size:1.7rem;font-weight:800;margin-top:6px;font-variant-numeric:tabular-nums}
.stat .num small{font-size:.75rem;font-weight:500;color:var(--sub);margin-left:2px}
.srow{background:var(--card);border-radius:18px;padding:14px;margin-bottom:10px}
.srow .top{display:flex;align-items:center;gap:8px;font-weight:800}
.srow .top .acc{margin-left:auto;font-size:.8rem;font-weight:800}
.srow .bar{height:7px;background:var(--line);border-radius:4px;margin:10px 0 6px;overflow:hidden}
.srow .bar i{display:block;height:100%;border-radius:4px}
.srow .d{font-size:.75rem;color:var(--sub)}
.srow .reset{margin-top:8px;border:0;background:var(--yellow);color:var(--brown-deep);border-radius:10px;
  padding:8px 14px;font-size:.85rem;font-weight:800;cursor:pointer;font-family:inherit}
.empty{text-align:center;padding:48px 20px;color:var(--sub)}
.empty svg{margin-bottom:10px}
.empty .t{font-weight:800;color:var(--ink);font-size:1.05rem;margin-bottom:6px}
.wcard{background:var(--card);border-radius:16px;padding:13px 14px;margin-bottom:8px;cursor:pointer}
.wcard .q{font-size:.92rem;line-height:1.55;display:flex;gap:8px}
.wcard .q span{flex:1}
.wcard .arrow{color:var(--sub);flex:none;transition:transform .2s}
.wcard.open .arrow{transform:rotate(180deg)}
.wcard .detail{display:none;margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
.wcard.open .detail{display:block}
.wcard .opt{font-size:.85rem;color:var(--sub);line-height:1.5;margin-bottom:5px;display:flex;gap:7px}
.wcard .opt.correct{color:var(--green);font-weight:800}
.wcard .exp{font-size:.82rem;color:var(--brown);background:var(--cream);border-radius:10px;padding:9px 11px;margin-top:7px;line-height:1.55}
nav{position:fixed;left:0;right:0;bottom:0;background:var(--brown);display:flex;
  padding:8px 10px calc(8px + env(safe-area-inset-bottom));gap:8px;z-index:50}
nav button{flex:1;border:0;background:transparent;color:#eeddc2;border-radius:12px;padding:9px 0;
  font-size:.95rem;font-weight:800;letter-spacing:1px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit}
nav button.on{background:var(--yellow);color:var(--brown-deep)}
nav svg{width:20px;height:20px}
#quiz{position:fixed;inset:0;background:var(--cream);z-index:100;display:none;flex-direction:column}
#quiz.on{display:flex}
#quiz .bar-top{background:var(--brown);color:#fff;padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
  display:flex;align-items:center;gap:10px}
#quiz .bar-top .ttl{font-weight:800;letter-spacing:1px}
#quiz .bar-top button{margin-left:auto;border:0;background:rgba(255,255,255,.18);color:#fff;border-radius:10px;
  padding:7px 14px;font-size:.85rem;cursor:pointer;font-family:inherit}
#quiz .body{flex:1;overflow-y:auto;padding:16px;max-width:560px;margin:0 auto;width:100%}
.pbar{height:7px;background:var(--line);border-radius:4px;overflow:hidden;margin-bottom:14px}
.pbar i{display:block;height:100%;background:var(--pudding);border-radius:4px;transition:width .25s}
.qmeta{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--sub);margin-bottom:12px}
.qmeta .schip{padding:4px 10px;border-radius:99px;font-weight:800}
.qmeta .cnt{margin-left:auto;font-weight:800}
.passage{background:#fffdf4;border:1.5px solid var(--line);border-radius:14px;padding:13px;font-size:.95rem;
  line-height:1.75;margin-bottom:14px}
.qtext{font-size:1.1rem;line-height:1.7;font-weight:700;margin-bottom:16px;white-space:pre-wrap}
.opt-btn{display:flex;gap:10px;align-items:flex-start;width:100%;background:var(--card);border:1.5px solid var(--line);
  border-radius:16px;padding:12px;margin-bottom:10px;font-size:1rem;line-height:1.6;text-align:left;cursor:pointer;font-family:inherit;color:var(--ink)}
.opt-btn .letter{flex:none;width:28px;height:28px;border-radius:50%;background:var(--cream);color:var(--brown);
  font-weight:800;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.opt-btn .mark{flex:none;margin-left:auto;align-self:center}
.opt-btn.right{border-color:var(--green);background:#f0faf4}
.opt-btn.right .letter{background:var(--green);color:#fff}
.opt-btn.wrongpick{border-color:var(--red);background:#fdf3f2}
.opt-btn.wrongpick .letter{background:var(--red);color:#fff}
.opt-btn.dim{opacity:.55}
.expbox{background:#fffdf4;border:1.5px solid var(--yellow);border-radius:14px;padding:12px 13px;
  font-size:.92rem;line-height:1.65;color:var(--brown);margin-bottom:10px}
.expbox b{display:block;font-size:.8rem;margin-bottom:4px;letter-spacing:1px}
.nextbtn{width:100%;border:0;background:var(--brown);color:#fff;border-radius:16px;padding:15px;
  font-size:1.05rem;font-weight:800;letter-spacing:2px;cursor:pointer;margin-top:6px;font-family:inherit}
.result{text-align:center;padding-top:24px}
.result .verdict{font-size:1.3rem;font-weight:800;letter-spacing:2px;color:var(--brown)}
.result .score{font-size:3.4rem;font-weight:800;margin:12px 0 2px;font-variant-numeric:tabular-nums}
.result .pct{color:var(--sub);margin-bottom:8px}
.result .stars{font-size:.9rem;font-weight:800;color:var(--pudding);margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:6px}
.result .wlist{text-align:left}
.result .witem{background:var(--card);border-radius:14px;padding:13px 14px;margin-bottom:8px}
.result .witem .q{font-size:.9rem;line-height:1.55;margin-bottom:6px}
.result .witem .a{font-size:.88rem;font-weight:800;color:var(--green);line-height:1.5}
.result .witem .e{font-size:.82rem;color:var(--brown);margin-top:5px;line-height:1.55}
.result .note{font-size:.78rem;color:var(--sub);margin:4px 0 16px}
</style>
</head>
<body>
<header>
  <h1>盈盈學習樂園</h1>
  <div class="sub">小五闖關題庫．答對的題目不再出現</div>
</header>

<main>
  <section class="tab on" id="tab-practice">
    <div class="hero">
      <div>
        <div class="lbl">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--pudding)" stroke="var(--pudding)" stroke-width="1.5" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          我的星星</div>
        <div class="num" style="color:var(--pudding);font-size:1.6rem"><span id="n-stars">0</span><small>顆</small></div>
      </div>
      <div>
        <div class="lbl">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--brown)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          已通關</div>
        <div class="num" style="color:var(--brown);font-size:1.6rem"><span id="n-mastered">0</span><small>題</small></div>
      </div>
      <div>
        <div class="lbl">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--c-math)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
          連續練習</div>
        <div class="num" style="color:var(--c-math);font-size:1.6rem"><span id="n-streak">0</span><small>天</small></div>
      </div>
    </div>
    <button class="bigbtn" onclick="startQuick()">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      <span>快速闖關<small>六科混合 10 題，通關的不再出現</small></span>
      <span class="spacer"></span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <h2>科目闖關</h2>
    <div class="grid" id="subject-grid"></div>
  </section>

  <section class="tab" id="tab-wrong"></section>
  <section class="tab" id="tab-stats"></section>
</main>

<nav>
  <button class="on" data-tab="practice" onclick="switchTab('practice')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    天天闖關
  </button>
  <button data-tab="wrong" onclick="switchTab('wrong')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    錯題複習
  </button>
  <button data-tab="stats" onclick="switchTab('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
    學習統計
  </button>
</nav>

<div id="quiz">
  <div class="bar-top">
    <span class="ttl" id="quiz-title"></span>
    <button onclick="closeQuiz()">離開</button>
  </div>
  <div class="body" id="quiz-body"></div>
</div>

<script>
const SUBJECTS = [
  {key:'chinese', label:'國語', color:'var(--c-chinese)', light:'#f7e7e7'},
  {key:'math',    label:'數學', color:'var(--c-math)',    light:'#fbeede'},
  {key:'english', label:'英語', color:'var(--c-english)', light:'#e5edf8'},
  {key:'science', label:'自然', color:'var(--c-science)', light:'#e3f2ec'},
  {key:'social',  label:'社會', color:'var(--c-social)',  light:'#efe9f7'},
  {key:'reading', label:'閱讀', color:'var(--c-reading)', light:'#f5ecdd'},
];
const LETTERS = ['A','B','C','D','E','F'];
let BANK = [];

const store = {
  get records(){ try{ return JSON.parse(localStorage.zy_records || '{}'); }catch(e){ return {}; } },
  set records(v){ localStorage.zy_records = JSON.stringify(v); },
  get days(){ try{ return JSON.parse(localStorage.zy_days || '[]'); }catch(e){ return []; } },
  set days(v){ localStorage.zy_days = JSON.stringify(v); },
  get stars(){ return parseInt(localStorage.zy_stars || '0', 10) || 0; },
  set stars(v){ localStorage.zy_stars = String(Math.max(0, v)); },
  get redeemed(){ return parseInt(localStorage.zy_redeemed || '0', 10) || 0; },
  set redeemed(v){ localStorage.zy_redeemed = String(v); },
};
const STAR_COST = 100; /* 100顆星星兌換100元零用錢 */
function qid(q){ return q.subj + '-' + q.num; }
function dkey(d){ return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function recordAnswer(q, correct){
  const recs = store.records;
  const r = recs[qid(q)] || {right:0, wrong:0, lastWrong:false};
  if (correct){ r.right++; r.lastWrong = false; store.stars = store.stars + 1; } else { r.wrong++; r.lastWrong = true; }
  recs[qid(q)] = r;
  store.records = recs;
  const days = store.days;
  const t = dkey(new Date());
  if (!days.includes(t)){ days.push(t); store.days = days; }
}
/* 闖關鐵則：答對過（right>0 且最後一次沒答錯）就算通關，永不再出現 */
function isMastered(q){
  const r = store.records[qid(q)];
  return !!(r && r.right > 0 && !r.lastWrong);
}
function masteredCount(pool){ return (pool || BANK).filter(isMastered).length; }
function streak(){
  const days = new Set(store.days);
  let d = new Date();
  if (!days.has(dkey(d))) d.setDate(d.getDate() - 1);
  let n = 0;
  while (days.has(dkey(d))){ n++; d.setDate(d.getDate() - 1); }
  return n;
}
function subjProgress(key){
  const qs = BANK.filter(q => q.subj === key);
  const m = qs.filter(isMastered).length;
  let right = 0, att = 0;
  qs.forEach(q => {
    const r = store.records[qid(q)];
    if (r){ right += r.right; att += r.right + r.wrong; }
  });
  return {mastered: m, total: qs.length, acc: att ? right / att : null};
}
function shuffle(a){ a = a.slice(); for (let i = a.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
/* 出題：只出「還沒通關」的題，錯過的優先 */
function pickChallenge(pool, n){
  const open = pool.filter(q => !isMastered(q));
  const recs = store.records;
  const wrongFirst = shuffle(open.filter(q => recs[qid(q)] && recs[qid(q)].lastWrong));
  const fresh = shuffle(open.filter(q => !recs[qid(q)]));
  return fresh.concat(wrongFirst).slice(0, n);
}
function wrongQuestions(){
  return BANK.filter(q => { const r = store.records[qid(q)]; return r && r.lastWrong; });
}

function switchTab(name){
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('on', b.dataset.tab === name));
  document.querySelectorAll('section.tab').forEach(s => s.classList.toggle('on', s.id === 'tab-' + name));
  render();
}

function renderPractice(){
  document.getElementById('n-stars').textContent = store.stars;
  document.getElementById('n-mastered').textContent = masteredCount();
  document.getElementById('n-streak').textContent = streak();
  const grid = document.getElementById('subject-grid');
  grid.innerHTML = '';
  SUBJECTS.forEach(s => {
    const p = subjProgress(s.key);
    const b = document.createElement('button');
    b.className = 'subcard';
    const complete = p.mastered === p.total && p.total > 0;
    b.onclick = () => complete ? resetSubjectAsk(s) : startSubject(s.key);
    b.innerHTML =
      '<div class="t" style="color:' + s.color + '">' + s.label + '闖關</div>' +
      '<div class="bar"><i style="width:' + (p.total ? Math.round(p.mastered / p.total * 100) : 0) + '%;background:' + s.color + '"></i></div>' +
      (complete
        ? '<div class="done">全部通關，點我重新挑戰</div>'
        : '<div class="d">通關 ' + p.mastered + '/' + p.total + ' 題</div>');
    grid.appendChild(b);
  });
}

function redeemStars(){
  if (store.stars < STAR_COST) return;
  if (!confirm('用 ' + STAR_COST + ' 顆星星兌換 ' + STAR_COST + ' 元零用錢嗎？')) return;
  store.stars = store.stars - STAR_COST;
  store.redeemed = store.redeemed + STAR_COST;
  alert('兌換成功！記得找媽媽領 ' + STAR_COST + ' 元');
  render();
}

function resetSubjectAsk(s){
  if (!confirm(s.label + '已全部通關！要清除紀錄、重新挑戰嗎？')) return;
  const recs = store.records;
  BANK.filter(q => q.subj === s.key).forEach(q => { delete recs[qid(q)]; });
  store.records = recs;
  render();
}

function renderWrong(){
  const el = document.getElementById('tab-wrong');
  const wrong = wrongQuestions();
  if (!wrong.length){
    el.innerHTML = '<div class="empty">' +
      '<svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' +
      '<div class="t">目前沒有錯題</div>答錯的題目會收在這裡<br>答對之後就變成通關</div>';
    return;
  }
  let html = '<button class="bigbtn" style="margin-top:2px" onclick="startWrongReview()">' +
    '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>' +
    '<span>重練錯題<small>共 ' + wrong.length + ' 題，一次最多 10 題</small></span><span class="spacer"></span>' +
    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>';
  SUBJECTS.forEach(s => {
    const qs = wrong.filter(q => q.subj === s.key);
    if (!qs.length) return;
    html += '<h2 style="color:' + s.color + '">' + s.label + '錯題（' + qs.length + '）</h2>';
    qs.forEach(q => {
      let opts = '';
      q.options.forEach((o, i) => {
        opts += '<div class="opt' + (i === q.ans ? ' correct' : '') + '"><b>' + LETTERS[i] + '</b><span>' + esc(o) + '</span></div>';
      });
      html += '<div class="wcard" onclick="this.classList.toggle(\'open\')">' +
        '<div class="q"><span>' + esc(q.q) + '</span>' +
        '<svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>' +
        '<div class="detail">' + opts +
        (q.exp ? '<div class="exp">' + esc(q.exp) + '</div>' : '') +
        '</div></div>';
    });
  });
  el.innerHTML = html;
}

function renderStats(){
  const el = document.getElementById('tab-stats');
  const recs = store.records;
  let right = 0, att = 0;
  Object.values(recs).forEach(r => { right += r.right; att += r.right + r.wrong; });
  const acc = att ? Math.round(right / att * 100) : null;
  let html = '<div class="statgrid">' +
    statCard('已經通關', masteredCount(), '題／' + BANK.length + ' 題', 'var(--pudding)',
      '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>') +
    statCard('連續練習', streak(), '天', 'var(--c-math)',
      '<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>') +
    statCard('累積作答', att, '次', 'var(--c-english)',
      '<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>') +
    statCard('整體答對', acc === null ? '－' : acc, '%', 'var(--green)',
      '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>') +
    '</div><h2>星星獎勵</h2>' +
    '<div class="srow"><div class="top" style="color:var(--pudding)">' +
    '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>' +
    '我的星星<span class="acc" style="color:var(--brown)">' + store.stars + ' 顆</span></div>' +
    '<div class="bar"><i style="width:' + Math.min(100, Math.round(store.stars % STAR_COST / STAR_COST * 100)) + '%;background:var(--pudding)"></i></div>' +
    '<div class="d">答對 1 題＝1 顆星星，' + STAR_COST + ' 顆可以兌換 ' + STAR_COST + ' 元零用錢' +
    (store.redeemed ? '（已兌換 ' + store.redeemed + ' 元）' : '') + '</div>' +
    (store.stars >= STAR_COST
      ? '<button class="reset" onclick="redeemStars()">兌換獎勵</button>'
      : '<div class="d" style="margin-top:6px">還差 ' + (STAR_COST - store.stars % STAR_COST) + ' 顆就能兌換</div>') +
    '</div><h2>科目進度</h2>';
  SUBJECTS.forEach(s => {
    const p = subjProgress(s.key);
    const accTxt = p.acc === null
      ? '<span class="acc" style="color:var(--sub)">尚未練習</span>'
      : '<span class="acc" style="color:' + (p.acc >= 0.6 ? 'var(--green)' : 'var(--c-math)') + '">答對率 ' + Math.round(p.acc * 100) + '%</span>';
    html += '<div class="srow"><div class="top" style="color:' + s.color + '">' + s.label + accTxt + '</div>' +
      '<div class="bar"><i style="width:' + (p.total ? Math.round(p.mastered / p.total * 100) : 0) + '%;background:' + s.color + '"></i></div>' +
      '<div class="d">通關 ' + p.mastered + '/' + p.total + ' 題</div></div>';
  });
  el.innerHTML = html;
}
function statCard(lbl, num, unit, color, iconPath){
  return '<div class="stat"><div class="lbl" style="color:' + color + '">' +
    '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + iconPath + '</svg>' +
    lbl + '</div><div class="num">' + num + '<small>' + unit + '</small></div></div>';
}

let session = null;
function startQuick(){ launch('快速闖關', pickChallenge(BANK, 10)); }
function startSubject(key){
  const s = SUBJECTS.find(x => x.key === key);
  launch(s.label + '闖關', pickChallenge(BANK.filter(q => q.subj === key), 10));
}
function startWrongReview(){ launch('錯題複習', shuffle(wrongQuestions()).slice(0, 10)); }
function launch(title, questions){
  if (!questions.length){ alert('目前沒有可以出的題目，太厲害了！'); return; }
  session = {title, questions, i: 0, right: 0, wrongs: [], picked: null};
  document.getElementById('quiz-title').textContent = title;
  document.getElementById('quiz').classList.add('on');
  renderQuestion();
}
function closeQuiz(){
  document.getElementById('quiz').classList.remove('on');
  session = null;
  render();
}
function renderQuestion(){
  const q = session.questions[session.i];
  const s = SUBJECTS.find(x => x.key === q.subj);
  const total = session.questions.length;
  let html = '<div class="pbar"><i style="width:' + Math.round(session.i / total * 100) + '%"></i></div>' +
    '<div class="qmeta"><span class="schip" style="background:' + s.light + ';color:' + s.color + '">' + s.label + '</span>' +
    '<span class="cnt">' + (session.i + 1) + '/' + total + '</span></div>' +
    (q.passage ? '<div class="passage">' + esc(q.passage) + '</div>' : '') +
    '<div class="qtext">' + esc(q.q) + '</div><div id="opts">';
  q.options.forEach((o, i) => {
    html += '<button class="opt-btn" onclick="pick(' + i + ')"><span class="letter">' + LETTERS[i] + '</span><span>' + esc(o) + '</span></button>';
  });
  html += '</div><div id="next-slot"></div>';
  const body = document.getElementById('quiz-body');
  body.innerHTML = html;
  body.scrollTop = 0;
}
function pick(i){
  if (session.picked !== null) return;
  session.picked = i;
  const q = session.questions[session.i];
  const correct = i === q.ans;
  if (correct) session.right++; else session.wrongs.push(q);
  recordAnswer(q, correct);
  const btns = document.querySelectorAll('#opts .opt-btn');
  btns.forEach((b, j) => {
    b.disabled = true;
    if (j === q.ans){
      b.classList.add('right');
      b.insertAdjacentHTML('beforeend', '<span class="mark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>');
    } else if (j === i){
      b.classList.add('wrongpick');
      b.insertAdjacentHTML('beforeend', '<span class="mark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>');
    } else {
      b.classList.add('dim');
    }
  });
  const last = session.i + 1 === session.questions.length;
  document.getElementById('next-slot').innerHTML =
    (q.exp ? '<div class="expbox"><b>' + (correct ? '答對了' : '小老師說') + '</b>' + esc(q.exp) + '</div>' : '') +
    '<button class="nextbtn" onclick="nextQ()">' + (last ? '看結果' : '下一題') + '</button>';
}
function nextQ(){
  session.picked = null;
  if (session.i + 1 === session.questions.length){ renderResult(); return; }
  session.i++;
  renderQuestion();
}
function renderResult(){
  const total = session.questions.length;
  const pct = Math.round(session.right / total * 100);
  const verdict = pct >= 80 ? '太棒了' : pct >= 60 ? '很不錯喔' : '再接再厲';
  let html = '<div class="result"><div class="verdict">' + verdict + '</div>' +
    '<div class="score" style="color:' + (pct >= 60 ? 'var(--green)' : 'var(--c-math)') + '">' + session.right + '/' + total + '</div>' +
    '<div class="pct">答對率 ' + pct + '%</div>' +
    '<div class="stars"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>獲得 ' + session.right + ' 顆星星，總共 ' + store.stars + ' 顆</div>';
  if (session.wrongs.length){
    html += '<div class="wlist"><h2>答錯題目</h2>';
    session.wrongs.forEach(q => {
      html += '<div class="witem"><div class="q">' + esc(q.q) + '</div>' +
        '<div class="a">正解 ' + LETTERS[q.ans] + '　' + esc(q.options[q.ans]) + '</div>' +
        (q.exp ? '<div class="e">' + esc(q.exp) + '</div>' : '') + '</div>';
    });
    html += '<div class="note">答錯的題目收進錯題本，答對後就通關</div></div>';
  }
  html += '<button class="nextbtn" onclick="closeQuiz()">完成</button></div>';
  const body = document.getElementById('quiz-body');
  body.innerHTML = html;
  body.scrollTop = 0;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function render(){ renderPractice(); renderWrong(); renderStats(); }

fetch('quiz.json')
  .then(r => r.json())
  .then(data => { BANK = data; render(); })
  .catch(() => {
    document.querySelector('main').innerHTML = '<div class="empty"><div class="t">題庫載入失敗</div>請確認網路後重新整理</div>';
  });
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
